<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places To Go...</title>
    <link rel="stylesheet" href="/secret/secretstyles.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/secret/">Home</a>
            <a href="/secret/plans/">Plans</a>
            <a href="/secret/places/" class ="active">Places</a>
            <a href="/secret/notes/">Notes</a>
        </div>
    </nav>

    <section class="content-card">
        <h2>Add a New Place</h2>
        <form id="placeForm">
            <input type="text" id="placeName" placeholder="Place Name" required style="width:100%; margin-bottom: 10px; padding: 8px;">
            <textarea id="comments" placeholder="Comments" required style="width:100%; height:80px; margin-bottom: 10px; padding: 8px;"></textarea>
            <input type="url" id="imageLink" placeholder="Image URL" required style="width:100%; margin-bottom: 10px; padding: 8px;">
            <input type="text" id="signature" placeholder="Your Name" required style="width:100%; margin-bottom: 10px; padding: 8px;">
            <button type="submit" id="submitBtn">Save Place</button>
        </form>
    </section>

    <section class="content-card">
        <h2>Recent Places</h2>
        <div id="placesList">Loading...</div>
        <div id="pagination" style="margin-top: 20px; display: flex; gap: 10px; align-items: center;"></div>
    </section>


    <script>
        const form = document.getElementById('placeForm');
        let currentPage = 1;

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('placeName').value,
                comments: document.getElementById('comments').value,
                image: document.getElementById('imageLink').value,
                signature: document.getElementById('signature').value
            };

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            await fetch('/api/save-place', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
        });

            form.reset();
            btn.disabled = false;
            loadPlaces(1); // Refresh to page 1
        });

        // Load and Paginate
        async function loadPlaces(page = 1) {
            currentPage = page;
            const res = await fetch(`/api/get-places?page=${page}`);
            const data = await res.json(); // Expects {items: [...], totalPages: X}
    
            const list = document.getElementById('placesList');
            list.innerHTML = data.items.map(p => `
                <div style="border-bottom: 1px solid #ccc; padding: 10px;">
                    <h3>${p[0]}</h3>
                    <img src="${p[2]}" style="max-width: 100%; height: auto;" alt="Place image">
                    <p>${p[1]}</p>
                    <small>By: ${p[3]}</small>
                </div>
            `).join('');

            renderPagination(data.totalPages);
        }

        function renderPagination(total) {
            const nav = document.getElementById('pagination');
            nav.innerHTML = `
                <button onclick="loadPlaces(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
                <span>${currentPage} / ${total}</span>
                <button onclick="loadPlaces(${currentPage + 1})" ${currentPage >= total ? 'disabled' : ''}>Next</button>
            `;
        }

        loadPlaces(currentPage);
    </script>


</body>
</html>
