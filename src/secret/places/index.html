<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Places To Go...</title>
    <link rel="stylesheet" href="/secret/secretstyles.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-links">
            <a href="/secret/">Home</a>
            <a href="/secret/plans/">Plans</a>
            <a href="/secret/places/" class ="active">Places</a>
            <a href="/secret/notes/">Notes</a>
        </div>
    </nav>

    <main class="container"> 
        <section class="content-card">
            <h2>Add a New Place</h2>
            <form id="placeForm">
                <input type="text" id="name" placeholder="Place Name" required style="width:100%; margin-bottom: 10px; padding: 8px;">
                <textarea id="comment" placeholder="Comment" required style="width:100%; height:100px; margin-bottom: 10px; padding: 8px;"></textarea>
                <input type="url" id="image" placeholder="Image Link" required style="width:100%; margin-bottom: 10px; padding: 8px;">
                <input type="text" id="person" placeholder="Your Name" required style="width:100%; margin-bottom: 10px; padding: 8px;">
                <button type="submit" class="btn" id="submitBtn">Save Place</button>
            </form>
        </section>

        <section class="content-card">
            <h2>Recent Places</h2>
            <div id="placesList">Loading...</div>
            <div id="pagination" style="margin-top: 20px; display: flex; gap: 10px;"></div>
        </section>
    </main>

<script>
const form = document.getElementById('placeForm');
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById('name').value,
        comment: document.getElementById('comment').value,
        image: document.getElementById('image').value,
        person: document.getElementById('person').value
    };
    await fetch('/api/save-place', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    form.reset();
    loadPlaces();
});

async function loadPlaces() {
    const response = await fetch('/api/get-places');
    const places = await response.json();
    const container = document.getElementById('placesList');
    // n[0]=Name, n[1]=Comment, n[2]=Image, n[3]=Person
    container.innerHTML = places.map(n => `
        <li style="margin-bottom: 20px;">
            <h3>${n[0]}</h3>
            <img src="${n[2]}" style="max-width:200px;"><br>
            <p>${n[1]}</p>
            <small>By: ${n[3]}</small>
        </li>
    `).join('');
}
loadPlaces();
</script>

</body>
</html>
