<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes...</title>
    <link rel="stylesheet" href="/secret/secretstyles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/secret/">Home</a>
            <a href="/secret/plans/">Plans</a>
            <a href="/secret/places/">Places</a>
            <a href="/secret/notes/" class ="active">Notes</a>
        </div>
    </nav>

    <main class="container">
    
        <section class="content-card">
            <h2 class="header-title">Add a New Note</h2>
            <form id="noteForm">
                <input type="text" id="title" placeholder="Title" required style="width:100%; margin-bottom: 10px; padding: 8px;">
                <textarea id="body" placeholder="Write your note here..." required style="width:100%; height:100px; margin-bottom: 10px; padding: 8px;"></textarea>
                <input type="text" id="signature" placeholder="Your Name" required style="width:100%; margin-bottom: 10px; padding: 8px;">
                <button type="submit" class="btn" id="submitBtn">Save Note</button>
            </form>
        </section>

        <section class="content-card">
            <h2>Recent Notes</h2>
            <ul id="notesList">Loading...</ul>
        </section>

    </main>

    <!-- JAVASCRIPT FOR FILES -->

    <script>
    const apiRoute = '/api/save-note'; 
    const form = document.getElementById('noteForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = 'Saving...';

        const data = {
            title: document.getElementById('title').value,
            body: document.getElementById('body').value,
            signature: document.getElementById('signature').value
        };

        // Call your Cloudflare Function
        fetch(apiRoute, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            // Check if the response is successful (Status 200-299)
            if (!response.ok) throw new Error('Server error');
    
            // Check if the response actually contains JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return response.json();
            } else {
                // If it's not JSON, we just return a success object to keep the flow going
                return { status: "success" };
            }
        })
        .then(() => {
            alert('Note saved successfully!');
            form.reset();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Failed to save note.');
        })
        .finally(() => {
            btn.disabled = false;
            btn.textContent = 'Save Note';
        });
    });

    // Recent Notes
    
    async function loadNotes() {
        try {
            const response = await fetch('/api/get-notes');
            const notes = await response.json();
            const container = document.getElementById('notesList');
    
            // n[0]=Title, n[1]=Date, n[2]=Body, n[3]=Signature
            container.innerHTML = notes.map(n => `
                <li class="note-item" style="margin-bottom: 20px; list-style: none;">
                    <strong>${n[0] || 'Untitled'}</strong><br>
                    <p style="margin: 5px 0;">${n[2] || ''}</p>
                    <small>By: ${n[3] || 'Anonymous'} on ${n[1] || 'N/A'}</small>
                </li>
            `).join('');
        } catch (err) {
            console.error('Fetch error:', err);
        }
    }
    loadNotes();
    </script>


</body>
</html>
