<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans...</title>
    <link rel="stylesheet" href="/secret/secretstyles.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/secret/">Home</a>
            <a href="/secret/plans/" class ="active">Plans</a>
            <a href="/secret/places/">Places</a>
            <a href="/secret/notes/">Notes</a>
        </div>
    </nav>

    <main class="container">
    
        <section class="content-card">
            <h2>Add a New Plan</h2>
            <form id="planForm">
                <input type="text" id="todo" placeholder="Things to Do" required>
                <textarea id="details" placeholder="Details" required></textarea>
                <input type="text" id="when" placeholder="When is it?" required>
                <input type="text" id="signature" placeholder="Your Name" required>
                <button type="submit" class="btn" id="submitBtn">Save Plan</button>
            </form>
        </section>

        <section class="content-card">
            <h2>Recent Plans</h2>
            <div id="plansList">Loading...</div>
        </section>
    </main>


<script>
const form = document.getElementById('planForm');
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        todo: document.getElementById('todo').value,
        details: document.getElementById('details').value,
        when: document.getElementById('when').value,
        signature: document.getElementById('signature').value
    };
    await fetch('/api/save-plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    form.reset();
    loadPlans();
});

async function loadPlans() {
    const res = await fetch('/api/get-plans');
    const plans = await res.json();
    document.getElementById('plansList').innerHTML = plans.map(p => `
        <div class="note-item">
            <strong>${p[0]}</strong> - <em>${p[2]}</em><br>
            <p>${p[1]}</p>
            <small>By: ${p[3]}</small>
        </div>
    `).join('');
}
loadPlans();
</script>


</body>
</html>
