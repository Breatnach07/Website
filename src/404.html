<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Eden Breatnach</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* Contextual styles specific to the 404 canvas layout */
       .error-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .error-title {
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .error-message {
            color: #475569;
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 2rem auto;
        }

        /* Roadworks-style warning graphic */
        .error-graphic {
            width: 140px;
            height: 140px;
            margin: 0 auto 2rem auto;

            background: #fff7ed;
            border: 4px dashed #f59e0b;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            color: #ea580c;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;

            position: relative;
            user-select: none;
        }

        /* Traffic light and cone images */
        .road-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            object-fit: contain;

            pointer-events: none;
            user-select: none;
        }   

        /* Temporary traffic light */
        .road-icon.left {
            left: -70px;
            bottom: 10px;
        }

        /* Traffic cone */
        .road-icon.right {
            right: -70px;
            bottom: 10px;
        }

        /* Optional subtle animation */
        @keyframes warningPulse {
            0%, 100% {
                border-color: #f59e0b;
            }
            50% {
                border-color: #fb923c;
            }
        }

        .error-graphic {
            animation: warningPulse 2.5s ease-in-out infinite;
        }

        @media (max-width: 600px) {
            .error-graphic {
                width: 120px;
                height: 120px;
                font-size: 3rem;
            }

            .road-icon {
                width: 60px;
                height: 60px;
            }

            .road-icon.left {
                left: -50px;
            }

            .road-icon.right {
                right: -50px;
            }
        }

    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">Eden Breatnach</div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/projects/">Projects</a>
            <a href="/apps/">Mobile Apps</a>
            <a href="/blog/">Blog</a>
        </nav>
    </header>

    <main class="container">
        <div class="content-card error-container">
            
            <div class="error-graphic">
                <img src="Error-Img/TrafficLight.png"
                    alt=""
                    class="road-icon left">
                    !
                <img src="Error-Img/TrafficCone.png"
                    alt=""
                    class="road-icon right">
            </div>
            
            <h1 class="error-code">Error <strong>404</strong></h1>
            <h2 class="error-title">Page Not Found</h2>
            
            <p class="error-message">
                Sorry, we couldn't find that page. It may have been moved, renamed, or is temporarily unavailable. Try checking the URL or heading back to the homepage.
            </p>
            
            <a href="/" class="btn" style="margin-top: 0; padding: 0.6rem 1.5rem;">Return to Homepage</a>
            
        </div>
    </main>

</body>
</html>
