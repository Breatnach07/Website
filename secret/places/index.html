<div id="places" class="content-card" style="display:none;">
    <div class="section-header">
        <h1>Places to Go</h1>
        <button class="btn action-btn" onclick="addPlaceEntry()">+ Add Place</button>
    </div>
    <ul id="places-list" style="list-style: none;"></ul>
</div>

<script>
    // Load existing places
    let places = JSON.parse(localStorage.getItem('myPlaces')) || [];

    // Render list function
    function renderPlaces() {
        const list = document.getElementById('places-list');
        list.innerHTML = places.map((p, index) => `
            <li style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>${p.name}</strong><br>
                    <small style="color: #666;">${p.location}</small>
                </div>
                <button onclick="deletePlaceEntry(${index})" style="background:#fee2e2; color:#b91c1c; border:none; padding: 5px 10px; border-radius: 4px; cursor:pointer;">Remove</button>
            </li>
        `).join('');
    }

    // Add entry function
    function addPlaceEntry() {
        const name = prompt("Name of place:");
        const location = prompt("Location/Country:");
        if (name && location) {
            places.push({ name, location });
            localStorage.setItem('myPlaces', JSON.stringify(places));
            renderPlaces();
        }
    }

    // Delete entry function
    function deletePlaceEntry(index) {
        places.splice(index, 1);
        localStorage.setItem('myPlaces', JSON.stringify(places));
        renderPlaces();
    }

    // Initial render call
    renderPlaces();
</script>
