<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Space</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Eden Breatnach</div>
        <div class="nav-links">
            <a href="/">Public Portfolio</a>
            <a href="#" class="active">Secret Zone</a>
        </div>
    </nav>

    <div class="container">
        <nav class="tabs">
            <a href="#" id="tab-home" class="active" onclick="showTab('home', 'tab-home')">Home</a>
            <a href="#" id="tab-plans" onclick="showTab('plans', 'tab-plans')">Plans</a>
            <a href="#" id="tab-places" onclick="showTab('places', 'tab-places')">Places to Go</a>
        </nav>

        <div id="home" class="content-card">
            <h1>Memories</h1>
            <p>Welcome to the private zone. Only for us.</p>
            <div class="photo-collage">
                <div class="collage-item"><img src="memory1.jpg" alt="Memory"></div>
            </div>
        </div>

        <div id="plans" class="content-card" style="display:none;">
            <div class="section-header">
                <h1>Upcoming Plans</h1>
                <button class="btn action-btn" onclick="addEntry('plans')">+ Add Plan</button>
            </div>
            <ul id="plans-list"></ul>
        </div>

        <div id="places" class="content-card" style="display:none;">
            <div class="section-header">
                <h1>Places to Go</h1>
                <button class="btn action-btn" onclick="addEntry('places')">+ Add Place</button>
            </div>
            <ul id="places-list"></ul>
        </div>
    </div>

    <script>
        function showTab(tabId, tabBtnId) {
            // Hide all cards
            document.querySelectorAll('.content-card').forEach(el => el.style.display = 'none');
            // Show selected card
            document.getElementById(tabId).style.display = 'block';
            
            // Toggle active class
            document.querySelectorAll('.tabs a').forEach(a => a.classList.remove('active'));
            document.getElementById(tabBtnId).classList.add('active');
        }

        function addEntry(type) {
            const title = prompt("Enter title:");
            const date = prompt("Enter date:");
            if (title && date) {
                // IMPORTANT: This is where you would call your Supabase API
                alert(`Added to ${type}: ${title} on ${date}. (Requires Database connection)`);
            }
        }
    </script>
</body>
</html>
