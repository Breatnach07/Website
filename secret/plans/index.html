<div id="plans" class="content-card" style="display:none;">
    <div class="section-header">
        <h1>Upcoming Plans</h1>
        <button class="btn action-btn" onclick="addPlanEntry()">+ Add Plan</button>
    </div>
    <ul id="plans-list" style="list-style: none;"></ul>
</div>

<script>
    // Load existing plans
    let plans = JSON.parse(localStorage.getItem('myPlans')) || [];

    // Render list function
    function renderPlans() {
        const list = document.getElementById('plans-list');
        list.innerHTML = plans.map((p, index) => `
            <li style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>${p.title}</strong><br>
                    <small style="color: #666;">${p.date}</small>
                </div>
                <button onclick="deletePlanEntry(${index})" style="background:#fee2e2; color:#b91c1c; border:none; padding: 5px 10px; border-radius: 4px; cursor:pointer;">Remove</button>
            </li>
        `).join('');
    }

    // Add entry function
    function addPlanEntry() {
        const title = prompt("Plan title:");
        const date = prompt("Date (YYYY-MM-DD):");
        if (title && date) {
            plans.push({ title, date });
            localStorage.setItem('myPlans', JSON.stringify(plans));
            renderPlans();
        }
    }

    // Delete entry function
    function deletePlanEntry(index) {
        plans.splice(index, 1);
        localStorage.setItem('myPlans', JSON.stringify(plans));
        renderPlans();
    }

    // Initial render call
    renderPlans();
</script>
