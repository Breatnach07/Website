<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes...</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Eden Breatnach</div>
        <div class="nav-links">
            <a href="/">Public Pages</a>
            <a href="#" class="active">Just you, and I...</a>
        </div>
    </nav>

    <div class="container">
        <nav class="tabs">
            <a href="#" id="tab-home" class="active" onclick="showTab('home', 'tab-home')">Home</a>
            <a href="#" id="tab-plans" onclick="showTab('plans', 'tab-plans')">Plans</a>
            <a href="#" id="tab-places" onclick="showTab('places', 'tab-places')">Places</a>
            <a href="#" id="tab-notes" onclick="showTab('notes', 'tab-notes')">Notes</a>
        </nav>

        <div id="home" class="content-card">
            <h1>Memories</h1>
            <div class="photo-collage" id="collage">
                <div class="collage-item"><img src="mem1.jpg" alt="Memory 1"></div>
            </div>
        </div>

        <div id="plans" class="content-card" style="display:none;">
            <div class="section-header">
                <h1>Upcoming Plans</h1>
                <button class="btn action-btn" onclick="addEntry('plans')">+ Add Plan</button>
            </div>
            <ul id="plans-list" style="list-style: none;"></ul>
        </div>

        <div id="places" class="content-card" style="display:none;">
            <div class="section-header">
                <h1>Places to Go</h1>
                <button class="btn action-btn" onclick="addEntry('places')">+ Add Place</button>
            </div>
            <ul id="places-list" style="list-style: none;"></ul>
        </div>

        <div id="notes" class="content-card" style="display:none;">
            <div class="section-header">
                <h1>Personal Notes</h1>
                <button class="btn action-btn" onclick="addEntry('notes')">+ Add Note</button>
            </div>
            <ul id="notes-list" style="list-style: none;"></ul>
        </div>
    </div>

    <script>
        // State management
        const state = {
            plans: JSON.parse(localStorage.getItem('myPlans')) || [],
            places: JSON.parse(localStorage.getItem('myPlaces')) || [],
            notes: JSON.parse(localStorage.getItem('myNotes')) || []
        };

        function showTab(tabId, tabBtnId) {
            document.querySelectorAll('.content-card').forEach(el => el.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.tabs a').forEach(a => a.classList.remove('active'));
            document.getElementById(tabBtnId).classList.add('active');
        }

        function renderAll() {
            renderList('plans', 'plans-list', p => `<li><strong>${p.title}</strong> - ${p.date}</li>`);
            renderList('places', 'places-list', p => `<li><strong>${p.name}</strong> - ${p.location}</li>`);
            renderList('notes', 'notes-list', n => `<li><strong>${n.title}</strong><br>${n.content}</li>`);
        }

        function renderList(key, elementId, template) {
            const list = document.getElementById(elementId);
            list.innerHTML = state[key].map((item, i) => `
                <li style="padding: 10px; border-bottom: 1px solid #eee;">
                    ${template(item)}
                    <button onclick="deleteEntry('${key}', ${i})" style="color:red; border:none; background:none;">Remove</button>
                </li>
            `).join('');
        }

        function addEntry(type) {
            if (type === 'plans') {
                state.plans.push({ title: prompt("Title:"), date: prompt("Date:") });
            } else if (type === 'places') {
                state.places.push({ name: prompt("Place:"), location: prompt("Country:") });
            } else if (type === 'notes') {
                state.notes.push({ title: prompt("Title:"), content: prompt("Note:") });
            }
            localStorage.setItem('my' + type.charAt(0).toUpperCase() + type.slice(1), JSON.stringify(state[type]));
            renderAll();
        }

        function deleteEntry(key, index) {
            state[key].splice(index, 1);
            localStorage.setItem('my' + key.charAt(0).toUpperCase() + key.slice(1), JSON.stringify(state[key]));
            renderAll();
        }

        renderAll();
    </script>
</body>
</html>
