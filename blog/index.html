<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Directory</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Eden Breatnach</div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/projects/">Projects</a>
            <a href="/apps/">Mobile Apps</a>
            <a href="/blog/" class="active">Blog</a>
        </nav>
    </header>

    <div class="container">
        <main class="content-card">
            
            <h1 class="item-title">My Blogs</h1>
            
            <div class="collage-grid" id="blog-grid"></div>

            <div class="tabs" style="justify-content: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
                <button class="nav-links a" id="prev-btn" onclick="changePage(-1)" style="border: none; cursor: pointer; padding: 0.5rem 1.2rem;">&larr;</button>
                <span id="page-indicator" style="font-weight: 600; color: #475569; align-self: center; font-size: 0.95rem; margin: 0 1rem;">Page 1</span>
                <button class="nav-links a" id="next-btn" onclick="changePage(1)" style="border: none; cursor: pointer; padding: 0.5rem 1.2rem;">&rarr;</button>
            </div>

        </main>
    </div>

    <script>
        const ITEMS_PER_PAGE = 20;
        let currentPage = 1;

        // ==== Blog Titles and Dates ==== //
        let blogPosts = [
            { id: 1, title: "Pilot Post", date: "09 June 2026", url: "/blog/Pilot-09-06" },
            { id: 2, title: "AI & The Environment", date: "15 June 2026", url: "/blog/AI-Environment-15-06" }
        ];

        const gridContainer = document.getElementById('blog-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageIndicator = document.getElementById('page-indicator');

        function initBlogSystem(data) {
            blogPosts = data.sort((a, b) => b.id - a.id);
            displayPosts(currentPage);
        }

        function displayPosts(page) {
            gridContainer.innerHTML = "";
            
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, blogPosts.length);

            const pageItems = blogPosts.slice(startIndex, endIndex);

            pageItems.forEach(post => {
                const card = document.createElement('div');
                // Maps dynamically to the global asset frame and interactive micro-interaction transitions
                card.className = 'collage-item';
                // Inline styles injected strictly to handle internal content stretching
                card.style.height = 'auto';
                card.style.padding = '1.5rem';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.justifyContent = 'between';
                
                card.innerHTML = `
                    <div>
                        <h3 class="item-subheading" style="margin-bottom: 0.5rem;">
                            <a href="${post.url}" style="color: #1e293b; text-decoration: none;">${post.title}</a>
                        </h3>
                        <div class="item-meta" style="border: none; padding: 0; margin: 0; font-size: 0.85rem;">${post.date}</div>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            const totalPages = Math.ceil(blogPosts.length / ITEMS_PER_PAGE) || 1;
            pageIndicator.innerText = `Page ${page} of ${totalPages}`;
            
            // Re-map active states to keep visibility profiles elegant
            if (page === 1) {
                prevBtn.style.opacity = '0.4';
                prevBtn.style.cursor = 'not-allowed';
            } else {
                prevBtn.style.opacity = '1';
                prevBtn.style.cursor = 'pointer';
            }

            if (endIndex >= blogPosts.length) {
                nextBtn.style.opacity = '0.4';
                nextBtn.style.cursor = 'not-allowed';
            } else {
                nextBtn.style.opacity = '1';
                nextBtn.style.cursor = 'pointer';
            }
        }

        function changePage(direction) {
            const maxPage = Math.ceil(blogPosts.length / ITEMS_PER_PAGE) || 1;
            const targetPage = currentPage + direction;

            if (targetPage >= 1 && targetPage <= maxPage) {
                currentPage = targetPage;
                displayPosts(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        initBlogSystem(blogPosts);
    </script>
</body>
</html>
