<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Directory</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* Unique Layout Extensions for the Blog Grid Matrix */
        .blog-header-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .blog-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }

        .blog-card:hover {
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .blog-title {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.25rem;
        }

        .blog-link {
            color: #1e293b;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .blog-link:hover {
            color: #2563eb;
        }

        .blog-date {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 400;
        }

        /* Pagination Controls matching your Tab aesthetics */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.25rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .nav-arrow {
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 4px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s ease;
            user-select: none;
        }

        .nav-arrow:hover:not(.disabled) {
            background-color: #cbd5e1;
            color: #0f172a;
        }

        .nav-arrow.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background-color: #f1f5f9;
            color: #94a3b8;
        }

        #page-indicator {
            font-size: 0.95rem;
            font-weight: 600;
            color: #475569;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">Eden Breatnach</div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/projects/">Projects</a>
            <a href="/apps/">Mobile Apps</a>
            <a href="/blog/" class="active">Blog</a>
        </nav>
    </header>

    <div class="container">
        <main class="content-card">
            
            <h1 class="blog-header-title">My Blogs</h1>
            
            <div class="blog-grid" id="blog-grid"></div>

            <div class="pagination">
                <div class="nav-arrow" id="prev-btn" onclick="changePage(-1)">&larr;</div>
                <span id="page-indicator">Page 1</span>
                <div class="nav-arrow" id="next-btn" onclick="changePage(1)">&rarr;</div>
            </div>

        </main>
    </div>

    <script>
        const ITEMS_PER_PAGE = 20;
        let currentPage = 1;

        // ==== Blog Titles and Dates ==== //
        let blogPosts = [
            { id: 1, title: "Pilot Post", date: "09 June 2026", url: "/blog/Pilot-09-06" },
            { id: 2, title: "AI & The Environment", date: "15 June 2026", url: "/blog/AI-Environment-15-06" }
        ];

        const gridContainer = document.getElementById('blog-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageIndicator = document.getElementById('page-indicator');

        function initBlogSystem(data) {
            // Sorts array by ID descending before execution starts
            blogPosts = data.sort((a, b) => b.id - a.id);
            displayPosts(currentPage);
        }

        function displayPosts(page) {
            gridContainer.innerHTML = "";
            
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, blogPosts.length);

            const pageItems = blogPosts.slice(startIndex, endIndex);

            pageItems.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div>
                        <h2 class="blog-title">
                            <a href="${post.url}" class="blog-link">${post.title}</a>
                        </h2>
                        <div class="blog-date">${post.date}</div>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            const totalPages = Math.ceil(blogPosts.length / ITEMS_PER_PAGE) || 1;
            pageIndicator.innerText = `Page ${page} of ${totalPages}`;
            
            prevBtn.classList.toggle('disabled', page === 1);
            nextBtn.classList.toggle('disabled', endIndex >= blogPosts.length);
        }

        function changePage(direction) {
            const maxPage = Math.ceil(blogPosts.length / ITEMS_PER_PAGE) || 1;
            const targetPage = currentPage + direction;

            if (targetPage >= 1 && targetPage <= maxPage) {
                currentPage = targetPage;
                displayPosts(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Initialize Engine execution
        initBlogSystem(blogPosts);
    </script>
</body>
</html>
