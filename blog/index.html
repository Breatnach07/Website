<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Directory</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --primary-color: #007bff;
            --border-color: #dee2e6;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        /* 4x5 Grid layout for 20 items */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* Rectangular Blog Box */
        .blog-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 150px;
        }

        .blog-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .blog-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .blog-link {
            color: var(--text-color);
            text-decoration: none;
        }

        .blog-link:hover {
            color: var(--primary-color);
        }

        /* Pagination Controls */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .nav-arrow {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            transition: background 0.2s;
            user-select: none;
        }

        .nav-arrow:hover:not(.disabled) {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .nav-arrow.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #page-indicator {
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">Eden Breatnach</div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/projects/">Projects</a>
            <a href="/apps/">Mobile Apps</a>
            <a href="/blog/" class="active">Blog</a>
        </nav>

    <div class="container">
        <h1>My Blogs</h1>
        
        <div class="blog-grid" id="blog-grid"></div>

        <div class="pagination">
            <div class="nav-arrow" id="prev-btn" onclick="changePage(-1)">&larr;</div>
            <span id="page-indicator">Page 1</span>
            <div class="nav-arrow" id="next-btn" onclick="changePage(1)">&rarr;</div>
        </div>
    </div>

    <script>
        // Configuration
        const ITEMS_PER_PAGE = 20;
        let currentPage = 1;

        // ==== Blog Names and URLS ==== //
        const blogPosts = [
                { id: 1, title: "Pilot Post", url: "blog/Pilot-10-06" },
                { id: 2, title: "AI & The Environment", url: "blog/AI-Environment-15-06" }
            ];

        const gridContainer = document.getElementById('blog-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageIndicator = document.getElementById('page-indicator');

        // Initialization function to handle sorting sequence
        function initBlogSystem(data) {
            // Sort Descending: forces higher IDs to the front of the array index
            blogPosts = data.sort((a, b) => b.id - a.id);
            displayPosts(currentPage);
        }

        function displayPosts(page) {
            gridContainer.innerHTML = "";
            
            // Calculate slice bounds based on the active page
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, blogPosts.length);

            const pageItems = blogPosts.slice(startIndex, endIndex);

            // Render execution
            pageItems.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <h2 class="blog-title">
                        <a href="${post.url}" class="blog-link">${post.title} (ID: ${post.id})</a>
                    </h2>
                `;
                gridContainer.appendChild(card);
            });

            // Update Pagination Status
            pageIndicator.innerText = `Page ${page} of ${Math.ceil(blogPosts.length / ITEMS_PER_PAGE)}`;
            
            // Direct boundary checks for control state
            prevBtn.classList.toggle('disabled', page === 1);
            nextBtn.classList.toggle('disabled', endIndex >= blogPosts.length);
        }

        function changePage(direction) {
            const maxPage = Math.ceil(blogPosts.length / ITEMS_PER_PAGE);
            const targetPage = currentPage + direction;

            if (targetPage >= 1 && targetPage <= maxPage) {
                currentPage = targetPage;
                displayPosts(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Visual reset on transition

</body>
</html>
